<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MatchAI World Cup 2026</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      padding:25px;
      background:#f7f7f7;
    }

    h1{
      margin-bottom:5px;
    }

    input{
      padding:12px;
      margin:6px;
      font-size:16px;
      width:180px;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      padding:12px 25px;
      font-size:16px;
      margin-top:10px;
      cursor:pointer;
      border:none;
      border-radius:8px;
      background:#111;
      color:white;
    }

    .card{
      margin-top:25px;
      padding:25px;
      border-radius:15px;
      display:inline-block;
      background:white;
      min-width:350px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .bar{
      background:#eee;
      height:14px;
      border-radius:10px;
      margin:6px 0;
      overflow:hidden;
    }

    .fill{
      height:14px;
    }
  </style>
</head>

<body>

<h1>🔮 MatchAI World Cup 2026</h1>
<p>AI Football Prediction System</p>

<input id="team1" placeholder="Home Team">
<input id="team2" placeholder="Away Team">
<br>
<button onclick="predict()">Predict</button>

<div id="status">Loading...</div>
<div id="result"></div>

<script>
let data = [];
let ready = false;

fetch("https://raw.githubusercontent.com/SamilSen/matchai/main/predictions.csv")
.then(r => r.text())
.then(t => {
  const rows = t.trim().split("\n").slice(1);

  data = rows.map(r => {
    const c = r.split(",");
    return {
      t1: c[0],
      t2: c[1],
      c1: c[2],
      c2: c[3],
      h: Number(c[4]),
      d: Number(c[5]),
      a: Number(c[6])
    };
  });

  ready = true;
  document.getElementById("status").innerHTML = "✅ Ready";
})
.catch(err => {
  document.getElementById("status").innerHTML = "❌ Load error";
});

function predict(){

  if(!ready){
    alert("Data still loading...");
    return;
  }

  const t1 = document.getElementById("team1").value.trim().toLowerCase();
  const t2 = document.getElementById("team2").value.trim().toLowerCase();

  const m = data.find(x =>
    x.t1.toLowerCase() === t1 && x.t2.toLowerCase() === t2
  );

  if(!m){
    document.getElementById("result").innerHTML = "❌ Match not found";
    return;
  }

  let pred =
    (m.h > m.d && m.h > m.a) ? m.t1 + " Win" :
    (m.a > m.h && m.a > m.d) ? m.t2 + " Win" :
    "Draw";

  document.getElementById("result").innerHTML = `
    <div class="card">

      <h2>${m.t1} vs ${m.t2}</h2>
      <h3>🔮 ${pred}</h3>

      <p>1: ${m.h}%</p>
      <div class="bar"><div class="fill" style="width:${m.h}%; background:green;"></div></div>

      <p>X: ${m.d}%</p>
      <div class="bar"><div class="fill" style="width:${m.d}%; background:orange;"></div></div>

      <p>2: ${m.a}%</p>
      <div class="bar"><div class="fill" style="width:${m.a}%; background:red;"></div></div>

    </div>
  `;
}
</script>

</body>
</html>
