<!DOCTYPE html>
<html>
<head>
  <title>MatchAI Predictor</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 25px;
      background: #f4f6fb;
    }

    /* LOGO (%40 küçültüldü) */
    .logo {
      width: 60%;
      height: auto;
      display: block;
      margin: 0 auto 15px auto;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* 🇺🇸 WORLD CUP 2026 (BOLD + LARGE + USA COLORS) */
    h1 {
      font-size: 44px;
      font-weight: 900;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #b91c1c, #ffffff, #2563eb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-box {
      padding: 12px;
      margin: 8px;
      font-size: 16px;
      border-radius: 10px;
      border: 2px solid #ccc;
      outline: none;
      transition: 0.3s;
      width: 200px;
    }

    .input-box:focus {
      border-color: #2563eb;
      box-shadow: 0 0 8px rgba(37,99,235,0.4);
    }

    .usa-button {
      margin-top: 10px;
      padding: 12px 25px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #e11d48;
      transition: 0.3s;
    }

    .usa-button:hover {
      transform: scale(1.05);
      background: #be123c;
    }

    .card {
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px;
      background: white;
      display: inline-block;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 340px;
    }

    .bar-bg {
      background: #eee;
      height: 14px;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .bar {
      height: 14px;
      border-radius: 10px;
    }

    .home { background: #22c55e; }
    .draw { background: #f59e0b; }
    .away { background: #ef4444; }

    /* FLAG STYLE */
    .flag {
      width: 28px;
      height: 20px;
      border-radius: 4px;
      object-fit: cover;
      margin: 0 6px;
      vertical-align: middle;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<img src="https://raw.githubusercontent.com/SamilSen/matchai/main/image.png" class="logo">

<h1>World Cup 2026</h1>

<input id="team1" class="input-box" placeholder="🏠 Home Team">
<input id="team2" class="input-box" placeholder="✈️ Away Team">

<br>

<button class="usa-button" onclick="predict()">PREDICT</button>

<div id="status">Loading...</div>
<div id="result"></div>

<script>
let data = [];

/* 🌍 COUNTRY FIX (GERMANY FIXED + WORLD MAPPING) */
function getCode(team) {
  const map = {
    "germany": "de",
    "deutschland": "de",
    "turkey": "tr",
    "türkiye": "tr",
    "usa": "us",
    "united states": "us",
    "brazil": "br",
    "france": "fr",
    "spain": "es",
    "england": "gb",
    "italy": "it",
    "argentina": "ar",
    "portugal": "pt",
    "netherlands": "nl"
  };

  return map[team.toLowerCase()] || team.slice(0,2).toLowerCase();
}

/* 🌍 FLAG CDN */
function flag(code) {
  return `<img class="flag" src="https://flagcdn.com/w40/${code.toLowerCase()}.png">`;
}

fetch("https://raw.githubusercontent.com/SamilSen/matchai/main/predictions.csv")
.then(r => r.text())
.then(t => {
  const rows = t.split("\n").slice(1);

  data = rows.map(r => {
    const c = r.split(",");
    return {
      t1: c[0],
      t2: c[1],
      h: +c[4],
      d: +c[5],
      a: +c[6]
    };
  });

  document.getElementById("status").innerHTML = "✅ Ready";
});

function predict() {
  const t1 = document.getElementById("team1").value.toLowerCase();
  const t2 = document.getElementById("team2").value.toLowerCase();

  const m = data.find(x =>
    x.t1.toLowerCase() === t1 && x.t2.toLowerCase() === t2
  );

  if (!m) {
    document.getElementById("result").innerHTML = "Not found";
    return;
  }

  let pred =
    (m.h > m.d && m.h > m.a) ? m.t1 + " Win" :
    (m.a > m.h && m.a > m.d) ? m.t2 + " Win" :
    "Draw";

  document.getElementById("result").innerHTML = `
    <div class="card">

      <h2>
        ${flag(getCode(m.t1))} ${m.t1}
        vs
        ${m.t2} ${flag(getCode(m.t2))}
      </h2>

      <h3>${pred}</h3>

      <p>Home (${m.h}%)</p>
      <div class="bar-bg"><div class="bar home" style="width:${m.h}%"></div></div>

      <p>Draw (${m.d}%)</p>
      <div class="bar-bg"><div class="bar draw" style="width:${m.d}%"></div></div>

      <p>Away (${m.a}%)</p>
      <div class="bar-bg"><div class="bar away" style="width:${m.a}%"></div></div>
    </div>
  `;
}
</script>

</body>
</html>
