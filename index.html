<!DOCTYPE html>
<html>
<head>
  <title>MatchAI Predictor</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 25px;
      background: #f4f6fb;
    }

    .logo {
      width: 86%;
      height: auto;
      display: block;
      margin: 0 auto 15px auto;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 44px;
      font-weight: 900;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #6d28d9, #a855f7, #ec4899, #6d28d9);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientMove 4s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .input-box {
      padding: 20px;
      margin: 8px;
      font-size: 26px;
      border-radius: 12px;
      border: 2px solid #ccc;
      width: 330px;
    }

    #team1 { background: #ecfdf5; border-color: #22c55e; }
    #team2 { background: #eff6ff; border-color: #3b82f6; }

    .usa-button {
      margin-top: 10px;
      padding: 20px 43px;
      font-size: 31px;
      font-weight: bold;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #e11d48;
      transition: 0.3s;
    }

    .usa-button:hover {
      transform: scale(1.05);
      background: #be123c;
    }

    .card {
      margin-top: 20px;
      padding: 35px;
      border-radius: 15px;
      background: white;
      display: inline-block;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      width: 520px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .bar-bg {
      background: #eee;
      height: 22px;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .bar {
      height: 22px;
      border-radius: 10px;
      width: 0;
      transition: width 1s ease;
    }

    .home { background: #22c55e; }
    .draw { background: #f59e0b; }
    .away { background: #ef4444; }

    .flag {
      width: 45px;
      height: 32px;
      border-radius: 4px;
      margin: 0 6px;
      vertical-align: middle;
    }

    /* 🔒 UPGRADE BOX */
    .upgrade {
      margin-top: 20px;
      display: none;
      background: #111827;
      color: white;
      padding: 20px;
      border-radius: 15px;
    }

    .upgrade button {
      padding: 15px 25px;
      background: #22c55e;
      border: none;
      color: white;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<img src="https://raw.githubusercontent.com/SamilSen/matchai/main/image.png" class="logo">

<h1>World Cup 2026 Prediction</h1>

<input id="team1" class="input-box" placeholder="🏠 Home Team">
<input id="team2" class="input-box" placeholder="✈️ Away Team">

<br><br>

<button class="usa-button" onclick="predict()">PREDICT</button>

<div id="result"></div>

<!-- UPGRADE BOX -->
<div id="upgradeBox" class="upgrade">
  <h2>🔒 Free Limit Reached</h2>
  <p>You used your 3 free predictions.</p>
  <p><b>Upgrade for $9.99</b></p>
  <button onclick="buyPremium()">Upgrade Now</button>
</div>

<script>
let freeCount = localStorage.getItem("freeCount")
  ? parseInt(localStorage.getItem("freeCount"))
  : 0;

// 📊 DATA (senin CSV yerine demo)
let data = [];

fetch("https://raw.githubusercontent.com/SamilSen/matchai/main/predictions.csv")
.then(r => r.text())
.then(t => {
  const rows = t.split("\n").slice(1);
  data = rows.map(r => {
    const c = r.split(",");
    return { t1:c[0], t2:c[1], h:+c[4], d:+c[5], a:+c[6] };
  });
});

function predict() {

  // 🔒 FREE LIMIT CHECK
  if (freeCount >= 3) {
    document.getElementById("upgradeBox").style.display = "block";
    return;
  }

  const t1 = team1.value.toLowerCase();
  const t2 = team2.value.toLowerCase();

  const m = data.find(x =>
    x.t1.toLowerCase() === t1 && x.t2.toLowerCase() === t2
  );

  if (!m) {
    result.innerHTML = "<div class='card'>Not found</div>";
    return;
  }

  freeCount++;
  localStorage.setItem("freeCount", freeCount);

  let pred = m.h > m.a ? "Home Win" : "Away Win";

  result.innerHTML = `
    <div class="card">
      <h2>${m.t1} vs ${m.t2}</h2>
      <h3>${pred}</h3>

      <p>Home: ${m.h}%</p>
      <div class="bar-bg"><div class="bar home" style="width:${m.h}%"></div></div>

      <p>Draw: ${m.d}%</p>
      <div class="bar-bg"><div class="bar draw" style="width:${m.d}%"></div></div>

      <p>Away: ${m.a}%</p>
      <div class="bar-bg"><div class="bar away" style="width:${m.a}%"></div></div>

      <p>Free used: ${freeCount}/3</p>
    </div>
  `;
}

// 💳 STRIPE LINK (buraya kendi linkini koy)
function buyPremium() {
  window.location.href = "https://buy.stripe.com/test_your_link_here";
}
</script>

</body>
</html>
